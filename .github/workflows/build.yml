name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-bridge:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    - name: Build Bridge Service
      run: |
        cd bridge-service/linux
        dotnet build -c Release

  build-apk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'
    - name: Build APK
      run: |
        cd mobile-app
        flutter pub get
        flutter build apk --release
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: swift-companion-app.apk
        path: mobile-app/build/app/outputs/flutter-apk/app-release.apk
